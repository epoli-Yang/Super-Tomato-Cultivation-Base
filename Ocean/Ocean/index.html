<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ocean Guide - Mobile Preview</title>
  <style>
    body {
      background-color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    #mobile-container {
      width: 375px;
      height: 812px;
      border: 10px solid #333;
      border-radius: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      position: relative;
      background-color: white;
      overflow: hidden;
    }
    #app-frame {
      width: 100%;
      height: 100%;
      border: none;
    }
    #notch {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 160px;
        height: 25px;
        background-color: #333;
        border-bottom-left-radius: 15px;
        border-bottom-right-radius: 15px;
        z-index: 100;
    }
  </style>
</head>
<body>
  <div id="mobile-container">
    <div id="notch"></div>
    <iframe id="app-frame" src="about:blank"></iframe>
  </div>

  <script>
    // This script will run the app inside the iframe.
    // We create the app's own document within the iframe to ensure it runs in its own context.
    const iframe = document.getElementById('app-frame');
    const iframeDoc = iframe.contentWindow.document;

    iframeDoc.open();
    iframeDoc.write(`
      <!DOCTYPE html>
      <html>
        <head>
          <meta charset="UTF-8" />
          <meta name="viewport" content="width=device-width, initial-scale=1.0" />
          <title>App</title>
          <script type="module" src="/src/main.js"><\/script>
        </head>
        <body>
          <div id="app"></div>
        </body>
      </html>
    `);
    iframeDoc.close();
  </script>
</body>
</html>
